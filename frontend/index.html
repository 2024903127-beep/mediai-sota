<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Viewport: no zoom, full-screen on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / mobile -->
    <meta name="theme-color" content="#16a37a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MediAI" />

    <!-- SEO -->
    <meta name="description" content="MediAI — AI-powered health assistant. Scan prescriptions, detect drug interactions, manage your health safely." />
    <meta name="author" content="Rahul Mishra" />
    <meta property="og:title" content="MediAI — Smart Health Assistant" />
    <meta property="og:description" content="Scan prescriptions, detect drug interactions, and understand your medicines with AI." />
    <meta property="og:type" content="website" />

    <title>MediAI — Smart Health Assistant</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Inter font: 300–800 weights for full design range -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent flash of unstyled content -->
    <style>
      body { margin: 0; background: #f8fafc; font-family: Inter, system-ui, sans-serif; }
      #root { min-height: 100dvh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
